spring.application.name=api-expo-admin

# 레포 루트의 .env 자동 로드 (파일 없으면 무시하고 기본값 사용)
spring.config.import=optional:file:../.env[.properties]
spring.datasource.url=jdbc:mysql://${DB_ADDRESS:localhost:3306}/${DB_NAME:fairpilot}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=${SERVER_PORT:8082}

jwt.secret=fairpilot-secret-key-must-be-at-least-32-characters-long!!
jwt.expiration-ms=86400000
oauth.google.client-id=${GOOGLE_CLIENT_ID:dummy-client-id}

# ?? AWS S3 ????????????????????????????????????????????????
aws.access-key=${AWS_ACCESS_KEY:dummy}
aws.secret-key=${AWS_SECRET_KEY:dummy}
aws.s3.bucket=${AWS_S3_BUCKET:fairpilot-dev}
aws.s3.region=${AWS_S3_REGION:ap-northeast-2}

# ?? Spring Mail (Gmail SMTP) ??????????????????????????????
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:dummy}
spring.mail.password=${MAIL_PASSWORD:dummy}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ?? ?? ?? ?????????????????????????????????????????????
invite.base-url=${INVITE_BASE_URL:http://localhost:3000}
invite.expiry-hours=72

mybatis.mapper-locations=classpath*:mapper/*.xml